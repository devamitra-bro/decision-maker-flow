# FILE: k8s/secret.example.yaml
# VERSION: 1.0.0
# START_MODULE_CONTRACT:
# PURPOSE: EXAMPLE Secret manifest for brainstorm-mcp. Documents the required secret
#          keys. NEVER commit real secret values. The real secret MUST be provisioned
#          via a secrets management solution (sealed-secrets, external-secrets, Vault).
# SCOPE: Example template only; not applied by kustomization.yaml in production clusters.
# KEYWORDS: [DOMAIN(9): Kubernetes; TECH(8): Secret; CONCEPT(9): SecretsManagement]
# LINKS_TO_SPECIFICATION: DevelopmentPlan_MCP.md §2.4 (Slice D scope), §6 #7 (no hardcoded creds).
# END_MODULE_CONTRACT
#
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# WARNING: THIS IS AN EXAMPLE FILE WITH PLACEHOLDER VALUES.
#          DO NOT APPLY THIS TO A PRODUCTION CLUSTER.
#          DO NOT STORE REAL SECRETS IN GIT.
#
# Production secret provisioning options:
#   1. Sealed Secrets (bitnami/sealed-secrets): encrypt with kubeseal, commit .yaml
#   2. External Secrets Operator: reference Vault/AWS Secrets Manager/GCP Secret Manager
#   3. Helm + --set: pass secrets at deploy time without committing to Git
#   4. kubectl create secret generic brainstorm-secrets --from-literal=... (one-time)
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
#
# START_RATIONALE:
# Q: Why include this file at all if it should never be applied as-is?
# A: It documents the exact key names that brainstorm-mcp expects from the Secret.
#    Without this reference, operators must read the deployment.yaml env blocks to
#    discover key names. The EXAMPLE suffix makes the intent unambiguous.
# END_RATIONALE
#
# START_CHANGE_SUMMARY:
# LAST_CHANGE: [v1.0.0 - Initial creation as Slice D: example secret with required keys.]
# END_CHANGE_SUMMARY
---
# EXAMPLE ONLY — replace with sealed-secrets / external-secrets / vault in production.
# Required keys:
#   hmac_secret  — minimum 32 bytes; used for HMAC-SHA256 session token verification.
#                  Generate: python3 -c "import secrets; print(secrets.token_hex(32))"
#   llm_api_key  — OpenRouter or compatible LLM gateway API key.
#                  Format varies by provider; typically starts with "sk-or-..." for OpenRouter.
apiVersion: v1
kind: Secret
metadata:
  name: brainstorm-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: brainstorm-mcp
    app.kubernetes.io/component: sub-agent
    app.kubernetes.io/part-of: crablink-mcp-gateway
  annotations:
    brainstorm.crablink/provisioning: "replace-with-sealed-secrets-or-external-secrets"
type: Opaque
stringData:
  hmac_secret: "replace-with-per-service-hmac-secret-32-bytes-minimum"
  llm_api_key: "replace-with-openrouter-or-gateway-llm-api-key"
